services:
  ecothrift:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: ecothrift-app

    ports:
      - "5000:5000"

    environment:
      - PORT=5000
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1

    volumes:
      # Mount the entire data folder so visual_index.pkl can be created as a FILE
      # Do NOT mount visual_index.pkl directly — Docker creates it as a directory
      - ecothrift-data:/app/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

volumes:
  ecothrift-data: